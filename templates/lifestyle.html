<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- __GOOGLE_FONTS__ -->
  <title>Ad Creative</title>
  <style>
    :root {
      /* __CSS_VARS__ */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .ad-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: var(--font-body);
    }

    /* Background image — full bleed */
    .ad-bg {
      position: absolute;
      inset: 0;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    /* Gradient overlay — bottom 50%, strong at bottom */
    .ad-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.05) 35%,
        rgba(0,0,0,0.6) 65%,
        rgba(0,0,0,0.88) 100%
      );
    }

    /* Top bar — logo */
    .ad-logo {
      position: absolute;
      top: 5%;
      right: 5%;
      max-width: 120px;
      max-height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
      display: none; /* shown by JS if logo URL exists */
    }

    /* Brand accent bar — top left */
    .ad-accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: var(--accent-color);
      opacity: 0.9;
    }

    /* Content block — bottom left */
    .ad-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6% 6% 5% 6%;
      color: #ffffff;
    }

    .ad-headline {
      font-family: var(--font-headline);
      font-weight: var(--font-headline-weight);
      font-size: clamp(28px, 5vw, 64px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      margin-bottom: 3%;
    }

    .ad-body {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(14px, 2.2vw, 26px);
      line-height: 1.45;
      opacity: 0.92;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      margin-bottom: 5%;
      max-width: 80%;
    }

    .ad-cta {
      display: inline-block;
      background: var(--cta-color);
      color: #ffffff;
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: clamp(13px, 1.8vw, 22px);
      letter-spacing: 0.02em;
      padding: 3% 7%;
      border-radius: 9999px;
      text-decoration: none;
      cursor: default;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      white-space: nowrap;
      text-align: center;
    }

    /* Disclaimer — very bottom strip */
    .ad-disclaimer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5% 6%;
      background: rgba(0,0,0,0.55);
      font-family: var(--font-body);
      font-size: clamp(8px, 1.1vw, 13px);
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      line-height: 1.3;
      display: none; /* shown by JS */
    }
  </style>
</head>
<body>
  <div class="ad-container"
       data-headline=""
       data-body=""
       data-cta=""
       data-disclaimer=""
       data-show-disclaimer="false"
       data-logo-url=""
       data-bg-url="">

    <div class="ad-bg"></div>
    <div class="ad-overlay"></div>
    <div class="ad-accent-bar"></div>

    <img class="ad-logo" src="" alt="Brand logo" id="logo">

    <div class="ad-content" id="content">
      <div class="ad-headline" id="headline"></div>
      <div class="ad-body" id="body"></div>
      <div class="ad-cta" id="cta"></div>
    </div>

    <div class="ad-disclaimer" id="disclaimer"></div>
  </div>

  <script>
    const container = document.querySelector('.ad-container');
    const headline = document.getElementById('headline');
    const body = document.getElementById('body');
    const cta = document.getElementById('cta');
    const disclaimer = document.getElementById('disclaimer');
    const logo = document.getElementById('logo');
    const content = document.getElementById('content');

    // Set background image directly — CSS variable approach fails for large images in Playwright
    const bgUrl = container.dataset.bgUrl || '';
    if (bgUrl) {
      document.querySelector('.ad-bg').style.backgroundImage = `url("${bgUrl}")`;
    }

    // Populate from data attributes
    headline.textContent = container.dataset.headline || '';
    body.textContent = container.dataset.body || '';
    cta.textContent = container.dataset.cta || '';

    const disclaimerText = container.dataset.disclaimer || '';
    const showDisclaimer = container.dataset.showDisclaimer === 'true';

    if (disclaimerText && showDisclaimer) {
      disclaimer.textContent = disclaimerText;
      disclaimer.style.display = 'block';
      // Adjust content bottom padding to avoid overlap
      content.style.paddingBottom = '10%';
    }

    // Hide body text if empty (Story format)
    if (!body.textContent.trim()) {
      body.style.display = 'none';
    }

    // Logo
    const logoUrl = container.dataset.logoUrl || '';
    if (logoUrl && logoUrl !== 'url()' && !logoUrl.includes('undefined')) {
      logo.src = logoUrl;
      logo.style.display = 'block';
    }
  </script>
</body>
</html>

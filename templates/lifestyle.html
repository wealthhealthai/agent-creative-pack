<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- __GOOGLE_FONTS__ -->
  <title>Ad Creative — Lifestyle</title>
  <style>
    :root { /* __CSS_VARS__ */ }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; }

    .ad-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: var(--font-body);
    }

    /* Background — full bleed, face always visible */
    .ad-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 20%; /* bias toward faces */
      background-repeat: no-repeat;
    }

    /* Subtle dual vignette — light at top for logo, light at bottom for CTA */
    .ad-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.30) 0%,
        rgba(0,0,0,0.05) 18%,
        rgba(0,0,0,0)    35%,
        rgba(0,0,0,0)    55%,
        rgba(0,0,0,0.08) 72%,
        rgba(0,0,0,0.42) 100%
      );
    }

    /* ── Logo — top center ── */
    .ad-logo-area {
      position: absolute;
      top: 5%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .ad-logo {
      max-height: 36px;
      max-width: 140px;
      object-fit: contain;
      filter: drop-shadow(0 1px 6px rgba(0,0,0,0.5)) brightness(10);
      display: none;
    }

    /* ── Headline block — upper third, centered ── */
    .ad-headline-area {
      position: absolute;
      top: 15%;
      left: 7%;
      right: 7%;
      text-align: center;
    }
    .ad-headline {
      font-family: var(--font-headline);
      font-weight: var(--font-headline-weight);
      font-size: clamp(28px, 6vw, 72px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.6),
        0 4px 20px rgba(0,0,0,0.3);
    }
    .ad-tagline {
      margin-top: 3%;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(13px, 2.2vw, 24px);
      color: rgba(255,255,255,0.90);
      text-shadow: 0 1px 8px rgba(0,0,0,0.55);
      line-height: 1.4;
    }

    /* ── CTA + Disclaimer — bottom ── */
    .ad-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3% 8% 3.5%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5%;
    }
    .ad-cta {
      display: inline-block;
      background: var(--cta-color);
      color: #ffffff;
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.01em;
      padding: 3.5% 10%;
      border-radius: 9999px;
      cursor: default;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      white-space: nowrap;
    }
    .ad-disclaimer {
      font-size: clamp(8px, 1.1vw, 12px);
      color: rgba(255,255,255,0.65);
      text-align: center;
      line-height: 1.3;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      display: none;
    }
  </style>
</head>
<body>
  <div class="ad-container"
       data-headline=""
       data-body=""
       data-cta=""
       data-disclaimer=""
       data-show-disclaimer="false"
       data-logo-url=""
       data-bg-url="">

    <div class="ad-bg" id="bg"></div>
    <div class="ad-overlay"></div>

    <!-- Logo top center -->
    <div class="ad-logo-area">
      <img class="ad-logo" id="logo" src="" alt="logo">
    </div>

    <!-- Headline upper third, centered -->
    <div class="ad-headline-area">
      <div class="ad-headline" id="headline"></div>
      <div class="ad-tagline" id="body"></div>
    </div>

    <!-- CTA + disclaimer bottom -->
    <div class="ad-bottom">
      <div class="ad-cta" id="cta"></div>
      <div class="ad-disclaimer" id="disclaimer"></div>
    </div>
  </div>

  <script>
    const c = document.querySelector('.ad-container');

    // Background image — direct style, avoids CSS variable limitations
    const bgUrl = c.dataset.bgUrl || '';
    if (bgUrl) {
      document.getElementById('bg').style.backgroundImage = `url("${bgUrl}")`;
    }

    // Copy
    document.getElementById('headline').textContent = c.dataset.headline || '';
    document.getElementById('body').textContent = c.dataset.body || '';
    document.getElementById('cta').textContent = c.dataset.cta || '';

    // Disclaimer
    const disc = c.dataset.disclaimer || '';
    if (disc && c.dataset.showDisclaimer === 'true') {
      const el = document.getElementById('disclaimer');
      el.textContent = disc;
      el.style.display = 'block';
    }

    // Hide tagline if empty
    if (!document.getElementById('body').textContent.trim()) {
      document.getElementById('body').style.display = 'none';
    }

    // Logo
    const logoUrl = c.dataset.logoUrl || '';
    if (logoUrl && !logoUrl.includes('undefined')) {
      const l = document.getElementById('logo');
      l.src = logoUrl;
      l.style.display = 'block';
    }
  </script>
</body>
</html>

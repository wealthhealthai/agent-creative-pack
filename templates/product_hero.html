<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- __GOOGLE_FONTS__ -->
  <title>Ad Creative — Product Hero</title>
  <style>
    :root { /* __CSS_VARS__ */ }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: var(--background-color); }

    .ad-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: var(--font-body);
      background: var(--background-color);
    }

    /* Top stripe — brand color */
    .ad-top-stripe {
      background: var(--primary-color);
      height: 1.5%;
      width: 100%;
      flex-shrink: 0;
    }

    /* Main content area */
    .ad-main {
      flex: 1;
      display: grid;
      grid-template-columns: 55% 45%;
      overflow: hidden;
    }

    /* Left — product image */
    .ad-image-panel {
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    /* Right — copy panel */
    .ad-copy-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8% 8% 8% 6%;
      background: #fff;
    }

    .ad-logo-wrap {
      margin-bottom: 8%;
    }
    .ad-logo { max-height: 32px; max-width: 100px; object-fit: contain; display: none; }

    .ad-headline {
      font-family: var(--font-headline);
      font-weight: var(--font-headline-weight);
      font-size: clamp(18px, 3.5vw, 46px);
      line-height: 1.1;
      color: var(--primary-color);
      letter-spacing: -0.02em;
      margin-bottom: 5%;
    }

    .ad-body {
      font-size: clamp(11px, 1.8vw, 20px);
      line-height: 1.5;
      color: #333333;
      margin-bottom: 8%;
    }

    .ad-cta {
      display: inline-block;
      background: var(--cta-color);
      color: #fff;
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: clamp(11px, 1.6vw, 18px);
      padding: 4% 10%;
      border-radius: 9999px;
      cursor: default;
      white-space: nowrap;
      align-self: flex-start;
    }

    /* Bottom bar — disclaimer */
    .ad-bottom-bar {
      background: var(--primary-color);
      padding: 1.5% 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .ad-disclaimer {
      font-size: clamp(7px, 1vw, 11px);
      color: rgba(255,255,255,0.75);
      flex: 1;
      display: none;
    }

    .ad-brand-name {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: clamp(10px, 1.3vw, 15px);
      color: rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>
  <div class="ad-container"
       data-headline=""
       data-body=""
       data-cta=""
       data-disclaimer=""
       data-show-disclaimer="false"
       data-logo-url=""
       data-bg-url="">

    <div class="ad-top-stripe"></div>

    <div class="ad-main">
      <div class="ad-image-panel"></div>
      <div class="ad-copy-panel">
        <div class="ad-logo-wrap">
          <img class="ad-logo" id="logo" src="" alt="logo">
        </div>
        <div class="ad-headline" id="headline"></div>
        <div class="ad-body" id="body"></div>
        <div class="ad-cta" id="cta"></div>
      </div>
    </div>

    <div class="ad-bottom-bar">
      <div class="ad-disclaimer" id="disclaimer"></div>
    </div>
  </div>

  <script>
    const c = document.querySelector('.ad-container');
    const bgUrl = c.dataset.bgUrl || '';
    if (bgUrl) { document.querySelector('.ad-image-panel').style.backgroundImage = `url("${bgUrl}")`; }
    document.getElementById('headline').textContent = c.dataset.headline || '';
    document.getElementById('body').textContent = c.dataset.body || '';
    document.getElementById('cta').textContent = c.dataset.cta || '';
    const disc = c.dataset.disclaimer || '';
    if (disc && c.dataset.showDisclaimer === 'true') {
      const el = document.getElementById('disclaimer');
      el.textContent = disc;
      el.style.display = 'block';
    }
    if (!document.getElementById('body').textContent.trim()) {
      document.getElementById('body').style.display = 'none';
    }
    const logoUrl = c.dataset.logoUrl || '';
    if (logoUrl) { const l = document.getElementById('logo'); l.src = logoUrl; l.style.display = 'block'; }
  </script>
</body>
</html>

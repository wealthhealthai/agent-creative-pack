<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- __GOOGLE_FONTS__ -->
  <title>Ad Creative — Minimal</title>
  <style>
    :root { /* __CSS_VARS__ */ }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: var(--background-color); }

    .ad-container {
      width: 100vw; height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      background: var(--background-color);
    }

    /* Subtle background image at low opacity */
    .ad-bg {
      position: absolute; inset: 0;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      opacity: 0.12;
    }

    /* Accent circle decoration */
    .ad-circle {
      position: absolute;
      width: 70vw; height: 70vw;
      max-width: 70vh; max-height: 70vh;
      border-radius: 50%;
      background: var(--accent-color);
      opacity: 0.06;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .ad-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 10%;
      max-width: 90%;
    }

    .ad-logo {
      max-height: 40px;
      max-width: 120px;
      object-fit: contain;
      margin-bottom: 8%;
      display: none;
    }

    .ad-headline {
      font-family: var(--font-headline);
      font-weight: var(--font-headline-weight);
      font-size: clamp(24px, 5vw, 60px);
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--primary-color);
      margin-bottom: 5%;
    }

    .ad-body {
      font-size: clamp(12px, 2vw, 24px);
      line-height: 1.55;
      color: #444;
      margin-bottom: 8%;
    }

    .ad-cta {
      display: inline-block;
      background: var(--cta-color);
      color: #fff;
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: clamp(12px, 1.8vw, 20px);
      padding: 3.5% 9%;
      border-radius: 9999px;
      cursor: default;
    }

    .ad-accent-line {
      width: 50px; height: 4px;
      background: var(--accent-color);
      margin: 0 auto 6%;
      border-radius: 2px;
    }

    .ad-disclaimer {
      position: absolute; bottom: 3%; left: 5%; right: 5%;
      font-size: clamp(8px, 1vw, 11px);
      color: #999; text-align: center; display: none;
    }
  </style>
</head>
<body>
  <div class="ad-container"
       data-headline="" data-body="" data-cta=""
       data-disclaimer="" data-show-disclaimer="false" data-logo-url="">
    <div class="ad-bg"></div>
    <div class="ad-circle"></div>
    <div class="ad-inner">
      <img class="ad-logo" id="logo" src="" alt="logo">
      <div class="ad-headline" id="headline"></div>
      <div class="ad-accent-line"></div>
      <div class="ad-body" id="body"></div>
      <div class="ad-cta" id="cta"></div>
    </div>
    <div class="ad-disclaimer" id="disclaimer"></div>
  </div>
  <script>
    const c = document.querySelector('.ad-container');
    document.getElementById('headline').textContent = c.dataset.headline || '';
    document.getElementById('body').textContent = c.dataset.body || '';
    document.getElementById('cta').textContent = c.dataset.cta || '';
    const disc = c.dataset.disclaimer || '';
    if (disc && c.dataset.showDisclaimer === 'true') {
      const el = document.getElementById('disclaimer'); el.textContent = disc; el.style.display = 'block';
    }
    if (!document.getElementById('body').textContent.trim()) {
      document.getElementById('body').style.display = 'none';
    }
    const logoUrl = c.dataset.logoUrl || '';
    if (logoUrl) { const l = document.getElementById('logo'); l.src = logoUrl; l.style.display = 'block'; }
  </script>
</body>
</html>

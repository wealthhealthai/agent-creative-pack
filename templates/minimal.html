<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Creative — Minimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* :root-vars */
    :root {
      --primary-color: #1A3F6F;
      --accent-color: #00B4D8;
      --cta-color: #00B4D8;
      --background-color: #ffffff;
      --font-headline: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-headline-weight: 700;
      --font-body-weight: 400;
      --bg-image: none;
      --logo-url: none;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--background-color);
    }

    /* ── Main ad container ─────────────────────────────────── */
    .ad-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Background image (subtle, if provided) ─────────────── */
    .ad-background {
      position: absolute;
      inset: 0;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.12;
    }

    /* ── Top accent bar ─────────────────────────────────────── */
    .ad-top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(
        to right,
        var(--primary-color),
        var(--accent-color)
      );
    }

    /* ── Logo ──────────────────────────────────────────────── */
    .ad-logo-area {
      position: absolute;
      top: 5%;
      right: 5%;
      z-index: 10;
    }

    .ad-logo {
      width: 100px;
      height: auto;
    }

    .ad-logo-fallback {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: clamp(12px, 1.5vw, 18px);
      color: var(--primary-color);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Center content block ───────────────────────────────── */
    .ad-center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 8%;
      max-width: 90%;
      gap: clamp(16px, 2.5vh, 32px);
    }

    /* ── Headline ───────────────────────────────────────────── */
    .ad-headline {
      font-family: var(--font-headline);
      font-weight: var(--font-headline-weight);
      font-size: clamp(24px, 5vw, 58px);
      line-height: 1.12;
      color: var(--primary-color);
      letter-spacing: -0.02em;
    }

    /* ── Decorative divider ─────────────────────────────────── */
    .ad-divider {
      width: 48px;
      height: 3px;
      background-color: var(--accent-color);
      border-radius: 2px;
    }

    /* ── Body copy ──────────────────────────────────────────── */
    .ad-body {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: clamp(13px, 1.9vw, 20px);
      line-height: 1.65;
      color: rgba(0, 0, 0, 0.6);
      max-width: 80%;
    }

    /* ── CTA button ─────────────────────────────────────────── */
    .ad-cta {
      display: inline-block;
      background-color: transparent;
      color: var(--cta-color);
      font-family: var(--font-headline);
      font-weight: 600;
      font-size: clamp(13px, 1.7vw, 17px);
      letter-spacing: 0.04em;
      padding: 0.75em 2em;
      border: 2px solid var(--cta-color);
      border-radius: 9999px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ── Disclaimer ─────────────────────────────────────────── */
    .ad-disclaimer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5em 6%;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(8px, 0.9vw, 10px);
      line-height: 1.4;
      color: rgba(0, 0, 0, 0.35);
      text-align: center;
      border-top: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.9);
      z-index: 20;
    }
  </style>
</head>
<body>
  <div class="ad-container"
       data-headline=""
       data-body=""
       data-cta="Learn More"
       data-disclaimer="">

    <!-- Top accent bar -->
    <div class="ad-top-bar"></div>

    <!-- Subtle background image -->
    <div class="ad-background"></div>

    <!-- Logo top-right -->
    <div class="ad-logo-area">
      <div class="ad-logo-fallback" id="ad-logo-area"></div>
    </div>

    <!-- Centered content -->
    <div class="ad-center">
      <h1 class="ad-headline" id="ad-headline"></h1>
      <div class="ad-divider" id="ad-divider"></div>
      <p class="ad-body" id="ad-body"></p>
      <span class="ad-cta" id="ad-cta"></span>
    </div>

    <!-- Disclaimer -->
    <div class="ad-disclaimer" id="ad-disclaimer" style="display:none;"></div>

  </div>

  <script>
    (function () {
      var container = document.querySelector('.ad-container');
      if (!container) return;

      var headline  = container.getAttribute('data-headline')   || '';
      var body      = container.getAttribute('data-body')       || '';
      var cta       = container.getAttribute('data-cta')        || 'Learn More';
      var disc      = container.getAttribute('data-disclaimer') || '';

      var h = document.getElementById('ad-headline');
      if (h) h.textContent = headline;

      var b = document.getElementById('ad-body');
      if (b) {
        if (body) { b.textContent = body; b.style.display = ''; }
        else { b.style.display = 'none'; }
      }

      var c = document.getElementById('ad-cta');
      if (c) c.textContent = cta;

      var d = document.getElementById('ad-disclaimer');
      if (d) {
        if (disc) { d.textContent = disc; d.style.display = ''; }
        else { d.style.display = 'none'; }
      }

      // Hide divider if no body copy
      var div = document.getElementById('ad-divider');
      if (div && !body) div.style.display = 'none';

      // Logo
      var logoArea = document.getElementById('ad-logo-area');
      if (logoArea) {
        var style = getComputedStyle(document.documentElement);
        var logoUrl = style.getPropertyValue('--logo-url').trim();
        var match = logoUrl.match(/url\(['"]?([^'"]+)['"]?\)/);
        if (match && match[1] && match[1] !== 'none') {
          var img = document.createElement('img');
          img.src = match[1];
          img.alt = '';
          img.className = 'ad-logo';
          img.onerror = function() { this.style.display = 'none'; };
          logoArea.parentNode.insertBefore(img, logoArea);
          logoArea.style.display = 'none';
        }
      }
    })();
  </script>
</body>
</html>
